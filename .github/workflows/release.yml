name: Release

on:
  workflow_call:
    inputs:
      validate:
        description: 'Run moogs-structure-validator before building'
        type: boolean
        default: false
      configPackTasks:
        description: 'Gradle tasks to publish config pack, space-separated (e.g. "publishCurseforgeDatapack"). Empty = no config pack.'
        type: string
        default: ''
      bumpVersion:
        description: 'Bump patch version and stub CHANGELOG after stable release'
        type: boolean
        default: true
      javaVersion:
        description: 'Java version'
        type: string
        default: '21'
    secrets:
      MODRINTH_API_KEY:
        required: true
      CURSEFORGE_API_KEY:
        required: true
      WORKER_API_KEY:
        required: true

jobs:
  validate:
    name: Validate Structures
    if: inputs.validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mod project
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout validator
        uses: actions/checkout@v4
        with:
          repository: FinnSetchell/moogs-structure-validator
          ref: v1
          path: validator

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r validator/requirements.txt

      - name: Run validator
        run: python validator/validator.py --config project/validator.json --project-root project

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    outputs:
      is_alpha:  ${{ steps.releaseType.outputs.is_alpha }}
      changelog: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.javaVersion }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        shell: bash
        run: |
          set -eo pipefail
          chmod +x gradlew
          ./gradlew build ${{ inputs.configPackTasks != '' && 'buildDatapack' || '' }}
          echo "---- build/libs ----"
          ls -la build/libs/
          if [ -d build/datapack ]; then
            echo "---- build/datapack ----"
            ls -la build/datapack/
          fi

      - name: Extract Changelog
        id: changelog
        shell: bash
        run: |
          VERSION=$(grep -E '^(modVersion|version|mod_version)=' gradle.properties | head -1 | cut -d= -f2 | tr -d '[:space:]')
          BODY=$(awk -v ver="$VERSION" '
            $0 ~ "^## [[]?" ver "($|[^-])" { capture=1; next }
            /^## / && capture { exit }
            capture { print }
          ' CHANGELOG.md)
          printf "body<<DELIMITER\n%s\nDELIMITER\n" "$BODY" >> "$GITHUB_OUTPUT"

      - name: Read releaseType
        id: releaseType
        shell: bash
        run: |
          RELEASE_TYPE=$(grep -E '^releaseType=' gradle.properties | cut -d= -f2 | tr -d ' \r\n' || echo 'major')
          RELEASE_TYPE=${RELEASE_TYPE:-major}
          echo "release_type=${RELEASE_TYPE}" >> "$GITHUB_OUTPUT"
          [ "$RELEASE_TYPE" = "alpha" ] && echo "is_alpha=true" >> "$GITHUB_OUTPUT" || echo "is_alpha=false" >> "$GITHUB_OUTPUT"

      - name: Publish to CurseForge & Modrinth
        shell: bash
        run: |
          set -eo pipefail
          EXCLUDE="-x announceDiscord"
          for task in ${{ inputs.configPackTasks }}; do
            EXCLUDE="$EXCLUDE -x $task"
          done
          ./gradlew publishMods $EXCLUDE
        env:
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Build release title and body
        id: release_meta
        shell: bash
        env:
          IS_ALPHA: ${{ steps.releaseType.outputs.is_alpha }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}
        run: |
          if [ "$IS_ALPHA" = "true" ]; then
            TITLE="${GITHUB_REF_NAME} (Alpha)"
            BANNER="> 🧪 **Alpha test build.** Feedback welcome at https://github.com/${GITHUB_REPOSITORY}/issues."
            BODY=$(printf "%s\n\n%s" "$BANNER" "$CHANGELOG_BODY")
          else
            TITLE="${GITHUB_REF_NAME}"
            BODY="$CHANGELOG_BODY"
          fi
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          printf "body<<DELIMITER\n%s\nDELIMITER\n" "$BODY" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.release_meta.outputs.title }}
          body: ${{ steps.release_meta.outputs.body }}
          prerelease: ${{ steps.releaseType.outputs.is_alpha == 'true' }}
          files: |
            build/libs/*.jar
            build/datapack/*.zip
          fail_on_unmatched_files: false

      - name: Bump patch version for next release
        if: inputs.bumpVersion && steps.releaseType.outputs.is_alpha != 'true'
        shell: bash
        run: |
          MC=$(grep '^minecraftVersion=' gradle.properties | cut -d= -f2)
          BRANCH="${MC}-datapack"
          TODAY=$(date -u +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          OLD=$(grep '^modVersion=' gradle.properties | cut -d= -f2)
          IFS='.' read -r -a P <<< "$OLD"
          NEW="${P[0]}.${P[1]}.$((P[2]+1))"
          sed -i "s|^modVersion=.*$|modVersion=${NEW}|" gradle.properties
          NEW_VERSION="$NEW" RELEASE_DATE="$TODAY" python3 - <<'PYEOF'
          import os, re
          from pathlib import Path
          new_v = os.environ['NEW_VERSION']
          today = os.environ['RELEASE_DATE']
          stub = (
              f"## [{new_v}] - {today}\n\n"
              "_Pending. Update this header date and replace this line with the actual changes before tagging._\n\n"
              "---\n\n"
          )
          p = Path('CHANGELOG.md')
          if p.exists():
              content = p.read_text(encoding='utf-8')
              match = re.search(r'# Changelog(?:\r?\n)+---(?:\r?\n)+', content)
              if match:
                  end = match.end()
                  content = content[:end] + stub + content[end:]
              else:
                  content = stub + content
              p.write_text(content, encoding='utf-8')
              print(f'✓ stubbed CHANGELOG.md with ## [{new_v}] - {today}')
          gp = Path('gradle.properties')
          if gp.exists():
              gp_text = re.sub(r'^discordPing=.*$', 'discordPing=true', gp.read_text(encoding='utf-8'), flags=re.MULTILINE)
              gp.write_text(gp_text, encoding='utf-8')
              print('✓ reset discordPing=true')
          PYEOF
          git add gradle.properties CHANGELOG.md
          git commit -m "Post-release: bump ${OLD} -> ${NEW} + stub CHANGELOG section"
          git push origin "$BRANCH"

  discord:
    name: Discord Announcement
    needs: release
    uses: FinnSetchell/release-actions/.github/workflows/discord-announce.yml@v1
    with:
      changelog: ${{ needs.release.outputs.changelog }}
    secrets:
      WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}

  config-pack:
    name: Publish Config Pack
    needs: release
    if: inputs.configPackTasks != '' && needs.release.outputs.is_alpha != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.javaVersion }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and publish config pack
        shell: bash
        run: |
          set -eo pipefail
          chmod +x gradlew
          ./gradlew buildDatapack ${{ inputs.configPackTasks }}
        env:
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
