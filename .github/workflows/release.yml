name: Release

on:
  workflow_call:
    inputs:
      validate:
        description: 'Run moogs-structure-validator before building'
        type: boolean
        default: false
      configPack:
        description: 'Config pack publish targets: "curseforge", "modrinth", or "curseforge modrinth". Empty = no config pack.'
        type: string
        default: ''
      javaVersion:
        description: 'Java version'
        type: string
        default: '21'
    secrets:
      WORKER_API_KEY:
        required: true

jobs:
  validate:
    name: Validate Structures
    if: inputs.validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mod project
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout validator
        uses: actions/checkout@v4
        with:
          repository: FinnSetchell/moogs-structure-validator
          ref: v1
          path: validator

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r validator/requirements.txt

      - name: Run validator
        run: python validator/validator.py --config project/validator.json --project-root project

  changelog:
    name: Extract Changelog
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version from alpha tag
        shell: bash
        run: |
          ALPHA_VERSION=$(echo "${GITHUB_REF_NAME}" | grep -oP '^\d+\.\d+\.\d+-alpha\.\d+(?=-)' || true)
          if [ -n "$ALPHA_VERSION" ]; then
            sed -i "s|^modVersion=.*$|modVersion=${ALPHA_VERSION}|" gradle.properties
            sed -i "s|^releaseType=.*$|releaseType=alpha|" gradle.properties
          fi

      - name: Extract Changelog
        id: changelog
        shell: bash
        run: |
          VERSION=$(grep -E '^(modVersion|version|mod_version)=' gradle.properties | head -1 | cut -d= -f2 | tr -d '[:space:]')
          extract_changelog() {
            local ver="$1"
            awk -v v="$ver" '$0 ~ "^## [[]?" v "($|[^-])" { capture=1; next } /^## / && capture { exit } capture { print }' CHANGELOG.md
          }
          BODY=$(extract_changelog "$VERSION")
          if [ -z "$BODY" ] && echo "$VERSION" | grep -qP '-alpha\.\d+$'; then
            STABLE_VERSION=$(echo "$VERSION" | sed 's/-alpha\.[0-9]*//')
            BODY=$(extract_changelog "$STABLE_VERSION")
          fi
          printf "body<<DELIMITER\n%s\nDELIMITER\n" "$BODY" >> "$GITHUB_OUTPUT"

  discord:
    name: Discord Review
    needs: changelog
    if: always() && needs.changelog.result == 'success'
    uses: FinnSetchell/release-actions/.github/workflows/discord-announce.yml@v1
    with:
      changelog:   ${{ needs.changelog.outputs.body }}
      configPack:  ${{ inputs.configPack }}
      javaVersion: ${{ inputs.javaVersion }}
    secrets:
      WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}
