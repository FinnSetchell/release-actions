name: Discord Announce

on:
  workflow_call:
    inputs:
      changelog:
        description: 'Changelog body for this release'
        required: true
        type: string
      configPack:
        description: 'Config pack publish targets (forwarded to Worker for publish phase)'
        type: string
        default: ''
      javaVersion:
        description: 'Java version (forwarded to Worker for publish phase)'
        type: string
        default: '21'
    secrets:
      WORKER_API_KEY:
        required: true

jobs:
  announce:
    name: Post to Discord review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from alpha tag
        shell: bash
        run: |
          # Alpha tag format: 3.0.0-alpha.2-1.21.x → modVersion=3.0.0-alpha.2
          ALPHA_VERSION=$(echo "${GITHUB_REF_NAME}" | grep -oP '^\d+\.\d+\.\d+-alpha\.\d+(?=-)' || true)
          if [ -n "$ALPHA_VERSION" ]; then
            sed -i "s|^modVersion=.*$|modVersion=${ALPHA_VERSION}|" gradle.properties
            sed -i "s|^releaseType=.*$|releaseType=alpha|" gradle.properties
            echo "Alpha build detected: modVersion set to ${ALPHA_VERSION}"
          fi

      - name: Read gradle.properties
        id: props
        shell: bash
        run: |
          get() { grep -E "^$1=" gradle.properties | cut -d= -f2 | tr -d ' \r\n'; }

          echo "modName=$(get modName)"               >> "$GITHUB_OUTPUT"
          echo "modVersion=$(get modVersion)"         >> "$GITHUB_OUTPUT"
          echo "mcVersion=$(get minecraftVersion)"    >> "$GITHUB_OUTPUT"
          echo "mcStart=$(get publishMcStart)"        >> "$GITHUB_OUTPUT"
          echo "mcEnd=$(get publishMcEnd)"            >> "$GITHUB_OUTPUT"
          echo "releaseType=$(get releaseType)"       >> "$GITHUB_OUTPUT"
          echo "discordPing=$(get discordPing)"       >> "$GITHUB_OUTPUT"
          echo "cfSlug=$(get curseforgeProjectSlug)"  >> "$GITHUB_OUTPUT"
          echo "mrSlug=$(get modrinthProjectSlug)"    >> "$GITHUB_OUTPUT"
          echo "bannerUrl=$(get discordBannerUrl)"    >> "$GITHUB_OUTPUT"
          echo "avatarUrl=$(get discordAvatarUrl)"    >> "$GITHUB_OUTPUT"
          echo "thumbnailUrl=$(get discordThumbnailUrl)" >> "$GITHUB_OUTPUT"
          echo "color=$(get discordEmbedColor)"       >> "$GITHUB_OUTPUT"
          echo "displayPrefix=$(get publishDisplayPrefix)" >> "$GITHUB_OUTPUT"
          echo "displaySuffix=$(get publishDisplaySuffix)" >> "$GITHUB_OUTPUT"
          EXTRA_RAW=$(get publishExtraMcVersions)
          EXTRA_JSON=$(echo "$EXTRA_RAW" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | { grep -v '^$' || true; } | jq -R . | jq -sc .)
          echo "mcExtra=${EXTRA_JSON:-[]}" >> "$GITHUB_OUTPUT"
          MC=$(get minecraftVersion)
          echo "branch=${MC}-datapack" >> "$GITHUB_OUTPUT"

      - name: Extract image URLs from changelog
        id: images
        shell: bash
        env:
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          IMAGE_URLS=$(echo "$CHANGELOG" | { grep -oP '!\[.*?\]\(\K[^)]+' || true; } | head -4 | jq -R . | jq -sc .)
          CLEAN_CHANGELOG=$(echo "$CHANGELOG" | sed 's/!\[.*\]([^)]*)//g' | sed '/^[[:space:]]*$/d' | sed -e '${/^$/d}')
          echo "imageUrls=$IMAGE_URLS" >> "$GITHUB_OUTPUT"
          printf "changelog<<DELIM\n%s\nDELIM\n" "$CLEAN_CHANGELOG" >> "$GITHUB_OUTPUT"

      - name: Send to Worker
        shell: bash
        env:
          WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}
          PROJECT:        ${{ github.repository }}
          TAG:            ${{ github.ref_name }}
          BRANCH:         ${{ steps.props.outputs.branch }}
          CONFIG_PACK:    ${{ inputs.configPack }}
          JAVA_VERSION:   ${{ inputs.javaVersion }}
          MOD_NAME:       ${{ steps.props.outputs.modName }}
          VERSION:        ${{ steps.props.outputs.modVersion }}
          MC_VERSION:     ${{ steps.props.outputs.mcVersion }}
          MC_START:       ${{ steps.props.outputs.mcStart }}
          MC_END:         ${{ steps.props.outputs.mcEnd }}
          RELEASE_TYPE:   ${{ steps.props.outputs.releaseType }}
          DISCORD_PING:   ${{ steps.props.outputs.discordPing == 'true' && 'true' || 'false' }}
          CF_SLUG:        ${{ steps.props.outputs.cfSlug }}
          MR_SLUG:        ${{ steps.props.outputs.mrSlug }}
          BANNER_URL:     ${{ steps.props.outputs.bannerUrl }}
          AVATAR_URL:     ${{ steps.props.outputs.avatarUrl }}
          THUMBNAIL_URL:  ${{ steps.props.outputs.thumbnailUrl }}
          COLOR:          ${{ steps.props.outputs.color }}
          DISPLAY_PREFIX: ${{ steps.props.outputs.displayPrefix }}
          DISPLAY_SUFFIX: ${{ steps.props.outputs.displaySuffix }}
          CHANGELOG_BODY: ${{ steps.images.outputs.changelog }}
          IMAGE_URLS:     ${{ steps.images.outputs.imageUrls }}
          MC_EXTRA:       ${{ steps.props.outputs.mcExtra }}
        run: |
          PAYLOAD=$(jq -n \
            --arg project     "$PROJECT" \
            --arg tag         "$TAG" \
            --arg branch      "$BRANCH" \
            --arg configPack  "$CONFIG_PACK" \
            --arg javaVersion "$JAVA_VERSION" \
            --arg modName     "$MOD_NAME" \
            --arg version     "$VERSION" \
            --arg mcVersion   "$MC_VERSION" \
            --arg mcStart     "$MC_START" \
            --arg mcEnd       "$MC_END" \
            --arg releaseType "$RELEASE_TYPE" \
            --argjson discordPing "$DISCORD_PING" \
            --arg cfSlug      "$CF_SLUG" \
            --arg mrSlug      "$MR_SLUG" \
            --arg bannerUrl   "$BANNER_URL" \
            --arg avatarUrl   "$AVATAR_URL" \
            --arg thumbnailUrl "$THUMBNAIL_URL" \
            --arg color       "$COLOR" \
            --arg displayPrefix "$DISPLAY_PREFIX" \
            --arg displaySuffix "$DISPLAY_SUFFIX" \
            --arg changelog   "$CHANGELOG_BODY" \
            --argjson imageUrls "$IMAGE_URLS" \
            --argjson mcExtra "$MC_EXTRA" \
            '{
              project:      $project,
              tag:          $tag,
              branch:       $branch,
              configPack:   $configPack,
              javaVersion:  $javaVersion,
              modName:      $modName,
              version:      $version,
              mcVersion:    $mcVersion,
              mcStart:      $mcStart,
              mcEnd:        $mcEnd,
              mcExtra:      $mcExtra,
              releaseType:  $releaseType,
              discordPing:  $discordPing,
              cfSlug:       $cfSlug,
              mrSlug:       $mrSlug,
              bannerUrl:    $bannerUrl,
              avatarUrl:    $avatarUrl,
              thumbnailUrl: $thumbnailUrl,
              color:        $color,
              displayPrefix: $displayPrefix,
              displaySuffix: $displaySuffix,
              changelog:    $changelog,
              imageUrls:    $imageUrls
            }')

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://moogsmods-bot.finndog176.workers.dev/release \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $WORKER_API_KEY" \
            -d "$PAYLOAD")

          echo "Worker responded: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Discord Worker returned $HTTP_CODE — review card may not have posted"
          fi
